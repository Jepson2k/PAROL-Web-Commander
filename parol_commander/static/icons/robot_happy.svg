<svg viewBox="3 3 18 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- antennas -->
  <rect x="7" y="4.5" width="1" height="3" rx="0.5" fill="#4caf50"/>
  <rect x="16" y="4.5" width="1" height="3" rx="0.5" fill="#4caf50"/>
  <!-- head filled -->
  <rect x="4.5" y="8.5" width="15" height="10" rx="2" fill="#4caf50"/>
  <!-- eyes default (white circles) -->
  <g class="eye-full">
    <circle cx="8" cy="12" r="1.8" fill="white"/>
    <circle cx="16" cy="12" r="1.8" fill="white"/>
  </g>
  <!-- eyes squint (hover) -->
  <g class="eye-squint">
    <path d="M6.2 12.2 Q8 10.5 9.8 12.2" stroke="white" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M14.2 12.2 Q16 10.5 17.8 12.2" stroke="white" stroke-width="1" stroke-linecap="round" fill="none"/>
  </g>
  <!-- smile -->
  <path d="M9 15.5 Q12 17.8 15 15.5" stroke="white" stroke-width="1" stroke-linecap="round" fill="none"/>
</svg>
