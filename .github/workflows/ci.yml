name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: System info
        run: |
          python -c "import platform; print(f'OS: {platform.system()} {platform.release()}'); print(f'CPU: {platform.processor() or platform.machine()}'); print(f'Python: {platform.python_version()}')"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (all)
        if: runner.os == 'Linux'
        run: pytest -m "not integration" --durations=10

      # Browser tests are slow on non-Linux runners and we rely on
      # NiceGUI / Quasar to deliver consistent cross-platform behaviour,
      # so we only run non-browser tests on Windows and macOS.
      - name: Run tests (no browser)
        if: runner.os != 'Linux'
        run: pytest -m "not integration and not browser" --durations=10
